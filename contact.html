    <main>
        <section id="contact" class="section-padding contact-section">
            <h2 class="section-title">Request a Private Quote</h2>
            <div class="contact-container">
                <form id="commissionForm">
                  <input type="text" name="Full Name" placeholder="Full Name" required />
                  <input type="email" name="Email Address" placeholder="Email Address" required />
                  <!-- <input type="number" name="Phone Number (012 345 6789)" placeholder="Phone Number" required /> -->
              
                  <div class="full-width">

                  </div>
                  
                  <div class="whatsapp-container full-width">
                    <label class="checkbox-container">
                      <input type="checkbox" name="WhatsApp">
                      <span class="checkmark"></span>
                      <span class="checkbox-label">This is also my WhatsApp number</span>
                    </label>
                  </div>
              
                  <select name="Project Category" class="full-width" required>
                    <option value="" disabled selected>Select Your Project Category</option>

                    <option>Mobile Food Carts</option>

                  </select>

    <script>
      const menuToggle = document.getElementById("menu-toggle");
      const navLinks = document.getElementById("nav-links");
      const navItems = navLinks.querySelectorAll("a");

      menuToggle.addEventListener("click", () => {
        navLinks.classList.toggle("active");
        menuToggle.classList.toggle("active");
      });

      navItems.forEach((link) => {
        link.addEventListener("click", () => {
          navLinks.classList.remove("active");
        });
      });
    </script>

    <script>
        document.getElementById("commissionForm").addEventListener("submit", function (e) {
  e.preventDefault();

  // Capture Values
  const name = this.querySelector('[name="Full Name"]').value;
  const email = this.querySelector('[name="Email Address"]').value;
  const phone = this.querySelector('[name="Phone Number"]').value;
  const category = this.querySelector('[name="Project Category"]').value;
  const details = this.querySelector('[name="Project Details"]').value;
  
  // WhatsApp Logic
  const isWhatsApp = this.querySelector('[name="WhatsApp"]').checked;
  let finalWhatsApp;

  if (isWhatsApp) {
    finalWhatsApp = phone;
  } else {
    // If not checked, ask for the specific WhatsApp number
    const promptValue = prompt("Please enter your WhatsApp contact number (or 'None'):");
    finalWhatsApp = (promptValue && promptValue.trim() !== "") ? promptValue : "Not Provided";
  }

  // Email Body
  const bodyText = `New Inquiry for KH&CO
---------------------------
Client: ${name}
Email: ${email}
Phone: ${phone}
WhatsApp: ${finalWhatsApp}
Category: ${category}

Project Details:
${details}`;

  const mailtoLink = `mailto:kg.thoke@gmail.com?subject=Project Inquiry: ${category}&body=${encodeURIComponent(bodyText)}`;

  window.location.href = mailtoLink;
  alert("Redirecting to your email app...");
  this.reset();
});
    </script>
